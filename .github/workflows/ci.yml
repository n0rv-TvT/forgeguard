name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Run Tests
        run: go test -v ./...

  # Self-dogfooding: Run ForgeGuard on itself!
  # Wait, since we don't have a pre-built action, we'll just build and run it manually
  scan-self:
    name: Self-Scan Workflow
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Build ForgeGuard
        run: go build -o forgeguard main.go
        
      - name: Run ForgeGuard on local workflows
        run: ./forgeguard .github/workflows/
